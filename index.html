<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no
">

<title>COBE GAME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#111;

    font-family:Arial;

    touch-action:none;

}

/* =====================================
ROTATE SCREEN MESSAGE
===================================== */

#rotateMessage{

    position:fixed;

    inset:0;

    background:black;

    color:white;

    display:none;

    justify-content:center;

    align-items:center;

    text-align:center;

    font-size:40px;

    z-index:9999;

    padding:40px;

}

/* ONLY PORTRAIT */

@media screen and (orientation: landscape){

    canvas,
    #lobby,
    #lobbyButton{

        display:none !important;

    }

    #rotateMessage{

        display:flex;

    }

}

/* =====================================
LOBBY
===================================== */

#lobby{

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:20px;

    background:
    linear-gradient(#111,#000);

    z-index:50;

    overflow-y:auto;

    padding:20px;

}

.title{

    color:white;

    font-size:75px;

    text-shadow:
    0 0 30px cyan;

    text-align:center;

}

.section{

    color:white;

    font-size:28px;

}

.select{

    padding:15px;

    border:none;

    border-radius:15px;

    font-size:22px;

}

.colors{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:15px;

}

.colorButton{

    width:80px;

    height:80px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    transition:0.2s;

}

.colorButton:hover{

    transform:scale(1.15);

}

.startButton{

    width:320px;

    padding:18px;

    border:none;

    border-radius:20px;

    font-size:28px;

    cursor:pointer;

    background:#00d9ff;

    color:white;

    transition:0.2s;

}

.startButton:hover{

    transform:scale(1.08);

}

/* =====================================
LOBBY BUTTON
===================================== */

#lobbyButton{

    position:absolute;

    top:20px;

    right:20px;

    z-index:100;

    padding:15px 25px;

    border:none;

    border-radius:20px;

    background:#3498db;

    color:white;

    font-size:24px;

    display:none;

    cursor:pointer;

}

/* =====================================
CANVAS
===================================== */

canvas{

    display:none;

    width:100vw;

    height:100vh;

    background:#5ecbff;

    touch-action:none;

}

</style>

</head>
<body>

<!-- =====================================
ROTATE MESSAGE
===================================== -->

<div id="rotateMessage">

📱 Please rotate your phone vertically

</div>

<!-- =====================================
LOBBY
===================================== -->

<div id="lobby">

<div class="title">

COBE GAME

</div>

<div class="section">

Shape / Animal

</div>

<select id="shapeSelect"
class="select">

<option value="square">
⬛ Square
</option>

<option value="circle">
⚪ Circle
</option>

<option value="triangle">
🔺 Triangle
</option>

<option value="cat">
🐱 Cat
</option>

<option value="dog">
🐶 Dog
</option>

<option value="rabbit">
🐰 Rabbit
</option>

</select>

<div class="section">

Color

</div>

<div class="colors">

<button class="colorButton"
style="background:red"
onclick="setColor('red')">
</button>

<button class="colorButton"
style="background:blue"
onclick="setColor('blue')">
</button>

<button class="colorButton"
style="background:green"
onclick="setColor('green')">
</button>

<button class="colorButton"
style="background:purple"
onclick="setColor('purple')">
</button>

<button class="colorButton"
style="background:orange"
onclick="setColor('orange')">
</button>

<button class="colorButton"
style="background:pink"
onclick="setColor('pink')">
</button>

<button class="colorButton"
style="background:gold"
onclick="setColor('gold')">
</button>

</div>

<button
class="startButton"
onclick="startGame()">

▶ START GAME

</button>

</div>

<button id="lobbyButton">

🏠 Lobby

</button>

<canvas id="game"></canvas>

<script>

// =====================================
// CANVAS
// =====================================

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

// =====================================
// AUDIO
// =====================================

const bonkSound =
new Audio(
"https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg"
);

// =====================================
// RESIZE
// =====================================

let ground = 0;

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

ground =
canvas.height * 0.82;

}

resize();

window.addEventListener(
"resize",
resize
);

// =====================================
// PLAYER
// VERY FAR LEFT
// =====================================

const player = {

x:-400,

y:0,

width:70,

height:70,

velocityY:0,

jumps:0,

holding:false,

rotation:0,

color:"red"

};

// =====================================
// GAME
// =====================================

let playerShape = "square";

let obstacles = [];

let platforms = [];

let particles = [];

let stars = [];

let cameraX = 0;

let gameOver = false;

let shake = 0;

// =====================================
// LEVELS
// =====================================

let level = 1;

let levelName = "Easy";

let speed = 5;

let gravity = 0.8;

let jumpPower = 16;

// =====================================
// STARS
// =====================================

for(let i=0;i<400;i++){

stars.push({

x:Math.random()*60000,

y:Math.random()*canvas.height,

size:Math.random()*3

});

}

// =====================================
// COLOR
// =====================================

function setColor(color){

player.color = color;

}

// =====================================
// START GAME
// =====================================

function startGame(){

playerShape =

document.getElementById(
"shapeSelect"
).value;

createWorld();

document.getElementById(
"lobby"
).style.display =
"none";

canvas.style.display =
"block";

}

// =====================================
// WORLD
// =====================================

function createWorld(){

obstacles = [];
platforms = [];

let x = 1000;

for(let i=0;i<600;i++){

// obstacle

obstacles.push({

x:x,

width:
40 +
Math.random()*70,

height:
60 +
Math.random()*200

});

// platform

if(Math.random() < 0.65){

platforms.push({

x:
x + 120,

y:
ground -
(
150 +
Math.random()*350
),

width:
180 +
Math.random()*160,

height:25

});

}

x +=
250 +
Math.random()*260;

}

}

// =====================================
// JUMP
// =====================================

function jump(){

if(player.jumps < 2){

player.velocityY =
-jumpPower;

player.jumps++;

player.holding = true;

createParticles();

bonkSound.currentTime = 0;

bonkSound.play();

}

}

function stopJump(){

player.holding = false;

}

// =====================================
// PARTICLES
// =====================================

function createParticles(){

for(let i=0;i<30;i++){

particles.push({

x:
player.x +
player.width/2,

y:
player.y +
player.height/2,

size:
3 + Math.random()*10,

speedX:
(Math.random()-0.5)*18,

speedY:
-Math.random()*14,

life:50,

color:player.color

});

}

}

// =====================================
// INPUT
// =====================================

canvas.addEventListener(
"touchstart",
function(e){

e.preventDefault();

if(gameOver){

restart();

}else{

jump();

}

}
);

document.addEventListener(
"keydown",
function(e){

if(e.code === "Space"){

if(gameOver){

restart();

}else{

jump();

}

}

}
);

// =====================================
// UPDATE PLAYER
// =====================================

function updatePlayer(){

if(
player.holding &&
player.velocityY < 0
){

player.velocityY -= 0.3;

}

player.velocityY += gravity;

player.y += player.velocityY;

if(player.jumps > 0){

player.rotation += 0.1;

}

// ground

if(

player.y +
player.height >=
ground

){

player.y =
ground -
player.height;

player.velocityY = 0;

player.jumps = 0;

player.rotation = 0;

}

// platforms

for(let p of platforms){

let bottom =
player.y +
player.height;

if(

player.x +
player.width >
p.x &&

player.x <
p.x +
p.width &&

bottom >= p.y &&

bottom <= p.y + 20 &&

player.velocityY >= 0

){

player.y =
p.y -
player.height;

player.velocityY = 0;

player.jumps = 0;

}

}

player.x += speed;

// PLAYER EXTREMELY LEFT

let offset =
canvas.width * -0.15;

cameraX += (

(
player.x -
offset
)

- cameraX

) * 0.025;

// LEVELS

let score =
Math.floor(player.x/1000);

level =
1 + Math.floor(score/5);

if(level < 4){

levelName = "Easy";

speed = 5;

}

if(level >= 4 &&
level < 8){

levelName = "Medium";

speed = 8;

}

if(level >= 8){

levelName = "Hard";

speed = 12;

}

}

// =====================================
// UPDATE OBSTACLES
// =====================================

function updateObstacles(){

for(let o of obstacles){

if(

player.x <
o.x + o.width &&

player.x +
player.width >
o.x &&

player.y <
ground &&

player.y +
player.height >

ground -
o.height

){

gameOver = true;

shake = 20;

document.getElementById(
"lobbyButton"
).style.display =
"block";

}

}

}

// =====================================
// UPDATE PARTICLES
// =====================================

function updateParticles(){

for(let p of particles){

p.x += p.speedX;

p.y += p.speedY;

p.life--;

}

particles =
particles.filter(
p => p.life > 0
);

}

// =====================================
// DRAW PLAYER
// =====================================

function drawPlayer(){

ctx.save();

ctx.shadowBlur = 40;

ctx.shadowColor =
player.color;

ctx.translate(

player.x-cameraX +
player.width/2,

player.y +
player.height/2

);

ctx.rotate(
player.rotation
);

// square

if(playerShape === "square"){

ctx.fillStyle =
player.color;

ctx.fillRect(
-35,-35,
70,70
);

}

// circle

if(playerShape === "circle"){

ctx.fillStyle =
player.color;

ctx.beginPath();

ctx.arc(
0,0,35,
0,
Math.PI*2
);

ctx.fill();

}

// triangle

if(playerShape === "triangle"){

ctx.fillStyle =
player.color;

ctx.beginPath();

ctx.moveTo(0,-40);

ctx.lineTo(40,40);

ctx.lineTo(-40,40);

ctx.closePath();

ctx.fill();

}

// cat

if(playerShape === "cat"){

ctx.fillStyle = player.color;

ctx.beginPath();
ctx.arc(0,0,35,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.moveTo(-25,-10);
ctx.lineTo(-10,-60);
ctx.lineTo(5,-15);
ctx.fill();

ctx.beginPath();
ctx.moveTo(25,-10);
ctx.lineTo(10,-60);
ctx.lineTo(-5,-15);
ctx.fill();

}

// dog

if(playerShape === "dog"){

ctx.fillStyle = player.color;

ctx.beginPath();
ctx.arc(0,0,36,0,Math.PI*2);
ctx.fill();

ctx.fillRect(-40,-10,16,45);
ctx.fillRect(24,-10,16,45);

}

// rabbit

if(playerShape === "rabbit"){

ctx.fillStyle = player.color;

ctx.beginPath();
ctx.arc(0,0,34,0,Math.PI*2);
ctx.fill();

ctx.fillRect(-18,-80,12,60);
ctx.fillRect(6,-80,12,60);

}

ctx.restore();

}

// =====================================
// DRAW
// =====================================

function draw(){

ctx.save();

if(shake > 0){

ctx.translate(

(Math.random()-0.5)
* shake,

(Math.random()-0.5)
* shake

);

shake -= 0.5;

}

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

// sky

let sky =
ctx.createLinearGradient(
0,0,
0,
canvas.height
);

sky.addColorStop(
0,
"#5ecbff"
);

sky.addColorStop(
1,
"#dff8ff"
);

ctx.fillStyle = sky;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

// stars

ctx.fillStyle =
"white";

for(let s of stars){

ctx.fillRect(

s.x-cameraX*0.1,

s.y,

s.size,

s.size

);

}

// ground

ctx.fillStyle =
"#2ecc71";

ctx.fillRect(
0,
ground,
canvas.width,
canvas.height-ground
);

// platforms

for(let p of platforms){

ctx.fillStyle =
"#8e5a2b";

ctx.fillRect(

p.x-cameraX,

p.y,

p.width,

p.height

);

// grass

ctx.fillStyle =
"#2ecc71";

ctx.fillRect(

p.x-cameraX,

p.y,

p.width,

6

);

}

// obstacles

ctx.fillStyle =
"#333";

for(let o of obstacles){

ctx.fillRect(
o.x-cameraX,
ground-o.height,
o.width,
o.height
);

}

// particles

for(let p of particles){

ctx.fillStyle =
p.color;

ctx.globalAlpha =
p.life/50;

ctx.fillRect(
p.x-cameraX,
p.y,
p.size,
p.size
);

}

ctx.globalAlpha = 1;

// player

drawPlayer();

// UI

ctx.fillStyle =
"white";

ctx.font =
"40px Arial";

ctx.fillText(
"Difficulty: " + levelName,
30,
60
);

ctx.fillText(
"Stage: " + level,
30,
110
);

// game over

if(gameOver){

ctx.fillStyle =
"rgba(255,0,0,0.35)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"white";

ctx.font =
"80px Arial";

ctx.fillText(
"GAME OVER",
canvas.width/2 - 240,
canvas.height/2
);

}

ctx.restore();

}

// =====================================
// UPDATE
// =====================================

function update(){

updatePlayer();

updateObstacles();

updateParticles();

}

// =====================================
// RESTART
// =====================================

function restart(){

player.x = -400;

player.y = 0;

player.velocityY = 0;

player.jumps = 0;

player.rotation = 0;

cameraX = 0;

gameOver = false;

}

// =====================================
// LOBBY BUTTON
// =====================================

const lobbyButton =
document.getElementById(
"lobbyButton"
);

lobbyButton.onclick =
function(){

canvas.style.display =
"none";

document.getElementById(
"lobby"
).style.display =
"flex";

lobbyButton.style.display =
"none";

};

// =====================================
// LOOP
// =====================================

function loop(){

if(canvas.style.display ===
"none"){

requestAnimationFrame(loop);

return;

}

if(!gameOver){

update();

}

draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
